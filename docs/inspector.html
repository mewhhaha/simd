<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simd wat inspector</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #11182d;
        --panel-alt: #162038;
        --border: #27324d;
        --text: #e5edf7;
        --muted: #96a4bf;
        --accent: #7dd3fc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: #0f172b;
      }

      .toolbar strong {
        font-size: 14px;
        color: var(--text);
      }

      .toolbar label,
      .meta {
        color: var(--muted);
        font-size: 13px;
      }

      select {
        min-width: 240px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        font: inherit;
        border-radius: 8px;
        outline: none;
      }

      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(125, 211, 252, 0.18);
      }

      .panes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 0;
      }

      .pane {
        min-width: 0;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .pane + .pane {
        border-left: 1px solid var(--border);
      }

      .pane-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--panel-alt);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      pre {
        margin: 0;
        padding: 16px;
        overflow: auto;
        white-space: pre;
        font-size: 13px;
        line-height: 1.5;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        background: var(--panel);
        color: var(--text);
      }

      @media (max-width: 900px) {
        .panes {
          grid-template-columns: 1fr;
        }

        .pane + .pane {
          border-left: 0;
          border-top: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="toolbar">
        <strong>simd wat inspector</strong>
        <label for="preset">preset</label>
        <select id="preset"></select>
        <span id="summary" class="meta"></span>
      </section>
      <section class="panes">
        <article class="pane">
          <div class="pane-header">
            <span>Source</span>
            <span id="source-meta"></span>
          </div>
          <pre id="source"></pre>
        </article>
        <article class="pane">
          <div class="pane-header">
            <span>WAT</span>
            <span id="wat-meta"></span>
          </div>
          <pre id="wat"></pre>
        </article>
      </section>
    </main>

      const select = document.getElementById("preset");
      const source = document.getElementById("source");
      const wat = document.getElementById("wat");
      const summary = document.getElementById("summary");
      const sourceMeta = document.getElementById("source-meta");
      const watMeta = document.getElementById("wat-meta");

      for (const preset of presets) {
        const option = document.createElement("option");
        option.value = preset.id;
        option.textContent = preset.label;
        select.appendChild(option);
      }

      function render(id) {
        const preset = presets.find((item) => item.id === id) ?? presets[0];
        select.value = preset.id;
        source.textContent = preset.source;
        wat.textContent = preset.wat;
        summary.textContent = `${preset.file} • main=${preset.main}`;
        sourceMeta.textContent = preset.file;
        watMeta.textContent = `${preset.wat.split("\n").length} lines`;

      select.addEventListener("change", (event) => render(event.target.value));
      render(presets[0]?.id);
