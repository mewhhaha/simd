<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simd shadertoy logo demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070b14;
        --panel: #111a2a;
        --panel-muted: #0d1526;
        --border: #26314a;
        --text: #e7edfa;
        --muted: #97a6c5;
        --accent: #7ed0ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(1000px 520px at 12% -20%, #1d2f5c 0%, var(--bg) 56%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      .app {
        max-width: 920px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
      }

      .toolbar {
        padding: 12px;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .toolbar strong {
        font-size: 14px;
      }

      .toolbar .meta {
        color: var(--muted);
        font-size: 12px;
      }

      .content {
        padding: 12px;
      }

      .control {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }

      .control label {
        color: var(--muted);
        font-size: 12px;
      }

      .control output {
        color: #c7d4ef;
        font-size: 12px;
        min-width: 64px;
      }

      input[type="range"] {
        width: 180px;
      }

      input[type="range"], button {
        color: var(--text);
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0a1222;
      }

      button {
        padding: 8px 10px;
        cursor: pointer;
      }

      .frame {
        display: grid;
        gap: 10px;
        padding: 12px;
      }

      canvas {
        width: 100%;
        height: auto;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #05070f;
        image-rendering: pixelated;
      }

      code {
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      @media (max-width: 920px) {
        .app {
          padding: 8px;
        }

        .control {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel toolbar">
        <strong>simd shadertoy logo demo</strong>
        <span class="meta">shadertoy-inspired GLSL port: no text, no raster work</span>
        <span id="status" class="meta">loading…</span>
      </section>

      <section class="panel content">
        <div class="control">
          <label for="timeScale">time speed</label>
          <input id="timeScale" type="range" min="0.1" max="2.4" value="1.0" step="0.1" />
          <output id="timeScaleOut">1.0</output>
          <label for="autoMouse">auto pointer</label>
          <input id="autoMouse" type="checkbox" checked />
          <button id="resetMouse">center</button>
          <span id="pointer" class="meta">mx=0, my=0</span>
        </div>

        <div id="details" class="meta">Open with <code>just demo</code> and click the demo.</div>

        <div class="frame">
          <canvas id="view" width="640" height="360"></canvas>
        </div>
      </section>
    </main>

    <script>
      const WASM_FILE = "./string_sdf_f32.wasm";
      const width = 640;
      const height = 360;
      const length = width * height;

      const status = document.getElementById("status");
      const details = document.getElementById("details");
      const timeScaleInput = document.getElementById("timeScale");
      const timeScaleOutput = document.getElementById("timeScaleOut");
      const autoMouseCheckbox = document.getElementById("autoMouse");
      const resetMouseButton = document.getElementById("resetMouse");
      const pointerOutput = document.getElementById("pointer");
      const canvas = document.getElementById("view");
      const ctx = canvas.getContext("2d", { alpha: false });
      const image = ctx.createImageData(width, height);
      const pixels = image.data;

      let state = {
        t: 0,
        mouseX: 0,
        mouseY: 0,
        autoMouse: true,
      };

      const instanceState = {
        memory: null,
        main: null,
        mainR: null,
        mainG: null,
        mainB: null,
        xsPtr: 0,
        ysPtr: 0,
        outRPtr: 0,
        outGPtr: 0,
        outBPtr: 0,
      };

      function align16(value) {
        return (value + 15) & ~15;
      }

      function ensureMemory(memory, neededBytes) {
        const page = 65536;
        if (memory.buffer.byteLength >= neededBytes) {
          return;
        }
        const missing = neededBytes - memory.buffer.byteLength;
        const pages = Math.ceil(missing / page);
        memory.grow(pages);
      }

      function buildCoords(buffer) {
        const xs = new Float32Array(buffer, instanceState.xsPtr, length);
        const ys = new Float32Array(buffer, instanceState.ysPtr, length);
        const invW = width > 1 ? 1 / (width - 1) : 0;
        const invH = height > 1 ? 1 / (height - 1) : 0;
        const aspect = width / Math.max(1, height);

        let index = 0;
        for (let y = 0; y < height; y += 1) {
          const ny = 1 - y * invH;
          const sy = (ny * 2 - 1) / 2;
          for (let x = 0; x < width; x += 1) {
            const nx = x * invW;
            const sx = (nx * 2 - 1) * aspect;
            xs[index] = sx;
            ys[index] = sy;
            index += 1;
          }
        }
      }

      function toByte(value) {
        if (value < 0) return 0;
        if (value > 1) return 255;
        return Math.floor(255 * value);
      }

      function render(now) {
        requestAnimationFrame(render);
        if (!instanceState.main && !(instanceState.mainR && instanceState.mainG && instanceState.mainB)) {
          return;
        }

        const speed = Number(timeScaleInput.value);
        state.t += ((now - state.lastFrame) / 1000) * speed;
        state.lastFrame = now;

        if (state.autoMouse) {
          state.mouseX = 0.55 * Math.sin(state.t * 0.71);
          state.mouseY = 0.35 * Math.cos(state.t * 0.43);
        }

        if (instanceState.mainR && instanceState.mainG && instanceState.mainB) {
          instanceState.mainR(
            state.t,
            state.mouseX,
            state.mouseY,
            instanceState.xsPtr,
            length,
            instanceState.ysPtr,
            length,
            instanceState.outRPtr,
            length,
          );
          instanceState.mainG(
            state.t,
            state.mouseX,
            state.mouseY,
            instanceState.xsPtr,
            length,
            instanceState.ysPtr,
            length,
            instanceState.outGPtr,
            length,
          );
          instanceState.mainB(
            state.t,
            state.mouseX,
            state.mouseY,
            instanceState.xsPtr,
            length,
            instanceState.ysPtr,
            length,
            instanceState.outBPtr,
            length,
          );
        } else {
          const outRPtr = instanceState.outRPtr;
          const outGPtr = instanceState.outGPtr;
          const outBPtr = instanceState.outBPtr;
          instanceState.main(
            state.t,
            state.mouseX,
            state.mouseY,
            instanceState.xsPtr,
            length,
            instanceState.ysPtr,
            length,
            outRPtr,
            length,
            outGPtr,
            length,
            outBPtr,
            length,
          );
        }

        const outR = new Float32Array(instanceState.memory.buffer, instanceState.outRPtr, length);
        const outG = new Float32Array(instanceState.memory.buffer, instanceState.outGPtr, length);
        const outB = new Float32Array(instanceState.memory.buffer, instanceState.outBPtr, length);

        for (let i = 0, p = 0; i < length; i += 1, p += 4) {
          pixels[p] = toByte(outR[i]);
          pixels[p + 1] = toByte(outG[i]);
          pixels[p + 2] = toByte(outB[i]);
          pixels[p + 3] = 255;
        }

        ctx.putImageData(image, 0, 0);
        pointerOutput.textContent = `mx=${state.mouseX.toFixed(3)} my=${state.mouseY.toFixed(3)}`;
        details.textContent = `frame ${state.t.toFixed(2)} • auto-mouse ${state.autoMouse ? "on" : "off"}`;
      }

      async function loadDemo() {
        status.textContent = "loading wasm…";
        const response = await fetch(WASM_FILE);
        if (!response.ok) {
          throw new Error(`failed to fetch ${WASM_FILE} (${response.status})`);
        }

        const bytes = await response.arrayBuffer();
        const { instance } = await WebAssembly.instantiate(bytes, {});
        const memory = instance.exports.memory;
        const main = instance.exports.main;
        const mainR = instance.exports["main$r"];
        const mainG = instance.exports["main$g"];
        const mainB = instance.exports["main$b"];

        if (!(memory instanceof WebAssembly.Memory)) {
          throw new Error("expected WebAssembly memory export");
        }

        if (!main && !(mainR && mainG && mainB)) {
          throw new Error("unexpected export shape; expected grouped or multi-leaf outputs");
        }

        const bytesPerArray = length * 4;
        const xsPtr = align16(0);
        const ysPtr = align16(xsPtr + bytesPerArray);
        const outRPtr = align16(ysPtr + bytesPerArray);
        const outGPtr = align16(outRPtr + bytesPerArray);
        const outBPtr = align16(outGPtr + bytesPerArray);
        const total = align16(outBPtr + bytesPerArray);

        ensureMemory(memory, total);
        buildCoords(memory.buffer);

        instanceState.memory = memory;
        instanceState.main = main;
        instanceState.mainR = mainR;
        instanceState.mainG = mainG;
        instanceState.mainB = mainB;
        instanceState.xsPtr = xsPtr;
        instanceState.ysPtr = ysPtr;
        instanceState.outRPtr = outRPtr;
        instanceState.outGPtr = outGPtr;
        instanceState.outBPtr = outBPtr;

        status.textContent = "running";
        pointerOutput.textContent = "mx=0.000 my=0.000";
      }

      timeScaleInput.addEventListener("input", () => {
        timeScaleOutput.textContent = Number(timeScaleInput.value).toFixed(1);
      });

      autoMouseCheckbox.addEventListener("change", () => {
        state.autoMouse = autoMouseCheckbox.checked;
      });

      resetMouseButton.addEventListener("click", () => {
        state.mouseX = 0;
        state.mouseY = 0;
        state.autoMouse = false;
        autoMouseCheckbox.checked = false;
      });

      canvas.addEventListener("mousemove", (event) => {
        if (state.autoMouse) {
          return;
        }

        const rect = canvas.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width;
        const y = (event.clientY - rect.top) / rect.height;
        const aspect = width / Math.max(1, height);
        state.mouseX = (x * 2 - 1) * aspect;
        state.mouseY = 0.5 - y;
      });

      canvas.addEventListener("mouseleave", () => {
        if (!state.autoMouse) {
          state.mouseX = 0;
          state.mouseY = 0;
        }
      });

      state.lastFrame = performance.now();
      loadDemo()
        .then(() => {
          requestAnimationFrame(render);
        })
        .catch((error) => {
          status.textContent = `error: ${error.message}`;
        });
    </script>
  </body>
</html>
