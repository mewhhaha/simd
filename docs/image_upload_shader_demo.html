<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simd image shader lab</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #05070c;
        --panel: #0f1420;
        --border: #253149;
        --text: #e7ecf7;
        --muted: #8c9ab7;
        --accent: #8be9fd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        background: radial-gradient(1200px 560px at 8% -18%, #1d2f57 0%, var(--bg) 54%);
        color: var(--text);
      }

      .app {
        max-width: 1220px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
      }

      .toolbar {
        padding: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        align-items: center;
      }

      .toolbar strong {
        font-size: 14px;
      }

      .toolbar .meta {
        color: var(--muted);
        font-size: 12px;
      }

      input[type="file"],
      select,
      button {
        font: inherit;
        color: var(--text);
        background: #0a1120;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 10px;
      }

      button {
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
      }

      .layout {
        display: grid;
        gap: 12px;
        grid-template-columns: 310px 1fr;
      }

      .controls {
        padding: 12px;
        display: grid;
        gap: 8px;
        align-content: start;
      }

      .control {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px 10px;
        align-items: center;
      }

      .control label {
        font-size: 12px;
        color: var(--muted);
      }

      .control output {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        color: #c7d3ef;
      }

      .control input[type="range"] {
        grid-column: 1 / -1;
        width: 100%;
      }

      .views {
        padding: 12px;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .view {
        display: grid;
        gap: 6px;
      }

      .view h3 {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }

      canvas {
        width: 100%;
        height: auto;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #03060c;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .views {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel toolbar">
        <strong>simd image shader lab</strong>
        <input id="upload" type="file" accept="image/*" />
        <label for="preset">preset</label>
        <select id="preset"></select>
        <button id="reset">reset</button>
        <button id="download">download png</button>
        <span id="status" class="meta">ready</span>
      </section>

      <section class="layout">
        <aside class="panel controls" id="controls"></aside>
        <section class="panel views">
          <article class="view">
            <h3>source</h3>
            <canvas id="sourceCanvas" width="960" height="540"></canvas>
          </article>
          <article class="view">
            <h3>shader output</h3>
            <canvas id="glCanvas" width="960" height="540"></canvas>
          </article>
        </section>
      </section>
    </main>

    <script>
      const PRESETS = [
        {
          id: "cinematic",
          label: "Cinematic Bloom",
          values: {
            exposure: 1.35,
            contrast: 1.22,
            saturation: 1.15,
            vignette: 0.72,
            aberration: 0.004,
            scanline: 0.04,
            grain: 0.03,
          },
        },
        {
          id: "crt",
          label: "CRT Punch",
          values: {
            exposure: 1.55,
            contrast: 1.38,
            saturation: 1.33,
            vignette: 0.63,
            aberration: 0.008,
            scanline: 0.28,
            grain: 0.09,
          },
        },
        {
          id: "dream",
          label: "Dream Fade",
          values: {
            exposure: 1.12,
            contrast: 0.94,
            saturation: 0.84,
            vignette: 0.84,
            aberration: 0.012,
            scanline: 0.0,
            grain: 0.05,
          },
        },
      ];

      const CONTROL_SPECS = [
        { key: "exposure", label: "Exposure", min: 0.2, max: 3, step: 0.01 },
        { key: "contrast", label: "Contrast", min: 0.4, max: 2.2, step: 0.01 },
        { key: "saturation", label: "Saturation", min: 0, max: 2, step: 0.01 },
        { key: "vignette", label: "Vignette", min: 0.5, max: 1.2, step: 0.005 },
        { key: "aberration", label: "Chromatic Aberration", min: 0, max: 0.02, step: 0.0001 },
        { key: "scanline", label: "Scanline", min: 0, max: 1, step: 0.01 },
        { key: "grain", label: "Film Grain", min: 0, max: 0.2, step: 0.001 },
      ];

      const upload = document.getElementById("upload");
      const preset = document.getElementById("preset");
      const controlsRoot = document.getElementById("controls");
      const status = document.getElementById("status");
      const resetButton = document.getElementById("reset");
      const downloadButton = document.getElementById("download");
      const sourceCanvas = document.getElementById("sourceCanvas");
      const glCanvas = document.getElementById("glCanvas");
      const sourceCtx = sourceCanvas.getContext("2d");
      const gl = glCanvas.getContext("webgl", {
        antialias: true,
        premultipliedAlpha: false,
      });

      if (!gl) {
        status.textContent = "WebGL unavailable in this browser";
        throw new Error("webgl unsupported");
      }

      const state = {
        timeStart: performance.now(),
        values: { ...PRESETS[0].values },
      };

      function createControl(spec) {
        const wrap = document.createElement("div");
        wrap.className = "control";
        const label = document.createElement("label");
        label.textContent = spec.label;
        label.htmlFor = `slider-${spec.key}`;
        const output = document.createElement("output");
        output.id = `value-${spec.key}`;
        const input = document.createElement("input");
        input.id = `slider-${spec.key}`;
        input.type = "range";
        input.min = String(spec.min);
        input.max = String(spec.max);
        input.step = String(spec.step);
        input.value = String(state.values[spec.key]);
        output.textContent = Number(input.value).toFixed(3);
        input.addEventListener("input", () => {
          state.values[spec.key] = Number(input.value);
          output.textContent = Number(input.value).toFixed(3);
        });
        wrap.appendChild(label);
        wrap.appendChild(output);
        wrap.appendChild(input);
        controlsRoot.appendChild(wrap);
      }

      for (const spec of CONTROL_SPECS) {
        createControl(spec);
      }

      for (const p of PRESETS) {
        const option = document.createElement("option");
        option.value = p.id;
        option.textContent = p.label;
        preset.appendChild(option);
      }

      function applyPreset(id) {
        const selected = PRESETS.find((p) => p.id === id) ?? PRESETS[0];
        state.values = { ...selected.values };
        for (const spec of CONTROL_SPECS) {
          const slider = document.getElementById(`slider-${spec.key}`);
          const value = document.getElementById(`value-${spec.key}`);
          slider.value = String(state.values[spec.key]);
          value.textContent = Number(slider.value).toFixed(3);
        }
        preset.value = selected.id;
      }

      preset.addEventListener("change", () => applyPreset(preset.value));
      resetButton.addEventListener("click", () => applyPreset(PRESETS[0].id));

      function compileShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          const log = gl.getShaderInfoLog(shader);
          gl.deleteShader(shader);
          throw new Error(`shader compile failed: ${log}`);
        }
        return shader;
      }

      const vertexSource = `
        attribute vec2 a_pos;
        varying vec2 v_uv;
        void main() {
          v_uv = (a_pos + 1.0) * 0.5;
          gl_Position = vec4(a_pos, 0.0, 1.0);
        }
      `;

      const fragmentSource = `
        precision highp float;
        varying vec2 v_uv;
        uniform sampler2D u_tex;
        uniform vec2 u_res;
        uniform float u_time;
        uniform float u_exposure;
        uniform float u_contrast;
        uniform float u_saturation;
        uniform float u_vignette;
        uniform float u_aberration;
        uniform float u_scanline;
        uniform float u_grain;

        float hash(vec2 p) {
          p = fract(p * vec2(127.1, 311.7));
          p += dot(p, p + 19.19);
          return fract(p.x * p.y);
        }

        vec3 saturateColor(vec3 c, float amount) {
          float l = dot(c, vec3(0.2126, 0.7152, 0.0722));
          return mix(vec3(l), c, amount);
        }

        void main() {
          vec2 uv = v_uv;
          vec2 centered = uv - 0.5;
          float dist = length(centered);
          vec2 dir = dist > 0.0001 ? centered / dist : vec2(0.0);
          float ca = u_aberration * dist * dist;

          float r = texture2D(u_tex, clamp(uv + dir * ca, 0.0, 1.0)).r;
          float g = texture2D(u_tex, uv).g;
          float b = texture2D(u_tex, clamp(uv - dir * ca, 0.0, 1.0)).b;
          vec3 color = vec3(r, g, b);

          color = vec3(1.0) - exp(-color * u_exposure);
          color = (color - 0.5) * u_contrast + 0.5;
          color = saturateColor(color, u_saturation);

          float vig = 1.0 - smoothstep(u_vignette, 1.05, dist);
          color *= vig;

          float line = sin((uv.y * u_res.y + u_time * 40.0) * 3.14159);
          color *= 1.0 - (0.5 + 0.5 * line) * u_scanline;

          float noise = hash(gl_FragCoord.xy + u_time * 120.0) - 0.5;
          color += noise * u_grain;

          gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
        }
      `;

      const program = gl.createProgram();
      const vs = compileShader(gl.VERTEX_SHADER, vertexSource);
      const fs = compileShader(gl.FRAGMENT_SHADER, fragmentSource);
      gl.attachShader(program, vs);
      gl.attachShader(program, fs);
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        throw new Error(`program link failed: ${gl.getProgramInfoLog(program)}`);
      }
      gl.useProgram(program);

      const quadBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
      gl.bufferData(
        gl.ARRAY_BUFFER,
        new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
        gl.STATIC_DRAW
      );
      const aPos = gl.getAttribLocation(program, "a_pos");
      gl.enableVertexAttribArray(aPos);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

      const texture = gl.createTexture();
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.uniform1i(gl.getUniformLocation(program, "u_tex"), 0);

      function resizeCanvases(width, height) {
        sourceCanvas.width = width;
        sourceCanvas.height = height;
        glCanvas.width = width;
        glCanvas.height = height;
        status.textContent = `${width}x${height}`;
      }

      function drawSource(image) {
        const maxW = 1280;
        const maxH = 720;
        const scale = Math.min(maxW / image.width, maxH / image.height, 1);
        const width = Math.max(1, Math.floor(image.width * scale));
        const height = Math.max(1, Math.floor(image.height * scale));
        resizeCanvases(width, height);
        sourceCtx.clearRect(0, 0, width, height);
        sourceCtx.drawImage(image, 0, 0, width, height);
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, sourceCanvas);
      }

      function makeFallbackImage() {
        const canvas = document.createElement("canvas");
        canvas.width = 960;
        canvas.height = 540;
        const ctx = canvas.getContext("2d");
        const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        g.addColorStop(0, "#183a66");
        g.addColorStop(0.5, "#2c6e88");
        g.addColorStop(1, "#7f5539");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.16)";
        for (let y = 0; y < canvas.height; y += 24) {
          for (let x = (y / 24) % 2 === 0 ? 0 : 12; x < canvas.width; x += 24) {
            ctx.fillRect(x, y, 12, 12);
          }
        }
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.font = "700 56px ui-sans-serif, system-ui";
        ctx.fillText("SIMD SHADER LAB", 64, 290);
        return canvas;
      }

      upload.addEventListener("change", async () => {
        const file = upload.files?.[0];
        if (!file) return;
        status.textContent = "loading image…";
        const url = URL.createObjectURL(file);
        try {
          const img = new Image();
          img.decoding = "async";
          img.src = url;
          await img.decode();
          drawSource(img);
        } finally {
          URL.revokeObjectURL(url);
        }
      });

      downloadButton.addEventListener("click", () => {
        const a = document.createElement("a");
        a.href = glCanvas.toDataURL("image/png");
        a.download = "simd-shader-output.png";
        a.click();
      });

      function render(now) {
        const time = (now - state.timeStart) * 0.001;
        gl.viewport(0, 0, glCanvas.width, glCanvas.height);
        gl.clearColor(0, 0, 0, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.uniform2f(gl.getUniformLocation(program, "u_res"), glCanvas.width, glCanvas.height);
        gl.uniform1f(gl.getUniformLocation(program, "u_time"), time);
        gl.uniform1f(gl.getUniformLocation(program, "u_exposure"), state.values.exposure);
        gl.uniform1f(gl.getUniformLocation(program, "u_contrast"), state.values.contrast);
        gl.uniform1f(gl.getUniformLocation(program, "u_saturation"), state.values.saturation);
        gl.uniform1f(gl.getUniformLocation(program, "u_vignette"), state.values.vignette);
        gl.uniform1f(gl.getUniformLocation(program, "u_aberration"), state.values.aberration);
        gl.uniform1f(gl.getUniformLocation(program, "u_scanline"), state.values.scanline);
        gl.uniform1f(gl.getUniformLocation(program, "u_grain"), state.values.grain);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(render);
      }

      applyPreset(PRESETS[0].id);
      drawSource(makeFallbackImage());
      requestAnimationFrame(render);
    </script>
  </body>
</html>
